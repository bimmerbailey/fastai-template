services:
  
  api: 
    tty: true
    build:
      context: .
      dockerfile: ./projects/api/Dockerfile
      target: dev 
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: example.env
        required: true
      - path: .env
        required: false
    environment:
      - FASTAI_POSTGRES_HOSTNAME=postgres
    ports:
      - "8000:8000"
    volumes:
      - ./bases/fastai/api:/src/bases/fastai/api
      - ./components:/src/components
      - ./test:/src/test
      - ./projects/api:/src/projects/api

  frontend:
    tty: true
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts

  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
      - ./development/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 10s
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:9.4
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: Password123!
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped

volumes:
  postgres:
  pgadmin:
  ollama: