services:
  
  api: 
    tty: true
    build:
      context: .
      dockerfile: ./projects/api/Dockerfile
      target: dev 
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file:
      - path: example.env
        required: true
      - path: .env
        required: false
    environment:
      - FASTAI_POSTGRES_HOSTNAME=postgres
      - FASTAI_STORAGE_ENDPOINT_URL=http://minio:9000
      - FASTAI_NATS_URL=nats://nats:4222
    ports:
      - "8000:8000"
    volumes:
      - ./bases/fastai/api:/src/bases/fastai/api
      - ./components:/src/components
      - ./test:/src/test
      - ./projects/api:/src/projects/api

  frontend:
    tty: true
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts

  postgres:
    image: pgvector/pgvector:0.8.2-pg18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
      - ./development/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 10s
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4:9.4
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: Password123!
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "5050:80"
    restart: unless-stopped

  minio:
    image: pgsty/minio:RELEASE.2026-03-25T00-00-00Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - minio:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    command: ["-js", "-sd", "/data", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - nats:/data

  worker:
    tty: true
    build:
      context: .
      dockerfile: ./projects/worker/Dockerfile
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    env_file:
      - path: example.env
        required: true
      - path: .env
        required: false
    environment:
      - FASTAI_POSTGRES_HOSTNAME=postgres
      - FASTAI_STORAGE_ENDPOINT_URL=http://minio:9000
      - FASTAI_NATS_URL=nats://nats:4222
    volumes:
      - ./bases/fastai/worker:/src/bases/fastai/worker
      - ./components:/src/components
      - ./projects/worker:/src/projects/worker

volumes:
  postgres:
  pgadmin:
  ollama:
  minio:
  nats: